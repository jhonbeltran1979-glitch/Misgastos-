<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f59e0b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MisGastos"/>
  <title>MisGastos 💸</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="apple-touch-icon" href="./icon-192.png"/>
  <link rel="icon" type="image/png" href="./icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0f172a;color:#f1f5f9;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    input,select,button{font-family:inherit}
    input:focus,select:focus{outline:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#1e293b}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
    @keyframes fadeUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes slideIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade{animation:fadeUp .35s ease}
    .tab-btn{flex:1;padding:10px 0;border:none;cursor:pointer;font-size:13px;font-weight:600;background:none;border-bottom:2px solid transparent;transition:all .2s;color:#64748b}
    .tab-btn.active{color:#f59e0b;border-bottom-color:#f59e0b}
    .cat-btn{background:#1e293b;border:2px solid #334155;border-radius:14px;padding:13px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .15s;width:100%}
    .inp{width:100%;background:#1e293b;border:2px solid #334155;border-radius:12px;padding:14px 15px;font-size:15px;color:#f1f5f9;transition:border .2s}
    .inp:focus{border-color:#f59e0b}
    .btn-primary{width:100%;padding:17px;border:none;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;font-size:16px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s}
    .btn-primary:disabled{background:#334155;color:#64748b;cursor:not-allowed}
    .card{background:#1e293b;border-radius:16px;padding:18px 16px;margin-bottom:14px}
    .gasto-row{background:#1e293b;border-radius:14px;padding:13px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#1e293b;border-radius:20px;padding:28px;width:100%;max-width:480px;border:1px solid #334155}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);border-radius:12px;padding:12px 22px;font-weight:600;font-size:14px;z-index:300;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5);pointer-events:none}
    select{background:#1e293b;border:1px solid #334155;color:#f1f5f9;border-radius:8px;padding:6px 8px;font-size:12px;cursor:pointer}
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid #1e293b;padding:20px 20px 0;position:sticky;top:0;z-index:50">
    <div style="max-width:640px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div>
          <div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px">💸 MisGastos</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
            <div id="dot" style="width:7px;height:7px;border-radius:50%;background:#ef4444"></div>
            <span id="conn-lbl" style="font-size:11px;color:#ef4444">Sin configurar</span>
          </div>
        </div>
        <div style="display:flex;gap:7px;align-items:center">
          <select id="sel-m"></select>
          <select id="sel-y"></select>
          <button id="btn-sync" style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px;display:none" title="Sync">🔄</button>
          <button onclick="openCfg()" style="background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;cursor:pointer;font-size:15px">⚙️</button>
        </div>
      </div>
      <div style="display:flex;gap:4px">
        <button class="tab-btn active" id="t-r" onclick="setTab('r')">✏️ Registrar</button>
        <button class="tab-btn" id="t-g" onclick="setTab('g')">📊 Gráficas</button>
        <button class="tab-btn" id="t-h" onclick="setTab('h')">📋 Historial</button>
      </div>
    </div>
  </div>

  <div style="max-width:640px;margin:0 auto;padding:20px 16px 80px">
    <div id="res-card" style="display:none;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:none;justify-content:space-between;align-items:center">
      <div>
        <div id="res-lbl" style="font-size:12px;font-weight:600;color:rgba(0,0,0,.6);margin-bottom:4px">TOTAL</div>
        <div id="res-tot" style="font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;color:#000;letter-spacing:-1px">$0</div>
        <div id="res-cnt" style="font-size:12px;color:rgba(0,0,0,.5);margin-top:4px">0 transacciones</div>
      </div>
      <div id="res-top"></div>
    </div>
    <div id="pnl-r" class="fade"></div>
    <div id="pnl-g" class="fade" style="display:none"></div>
    <div id="pnl-h" class="fade" style="display:none"></div>
    <div id="pnl-setup" style="display:none"></div>
  </div>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px">⚙️ Google Sheet URL</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.7">Pega el URL de tu <strong style="color:#f1f5f9">Apps Script Web App</strong>.<br>(Sheet → Extensiones → Apps Script → Implementar → Web App)</div>
    <input id="url-inp" class="inp" placeholder="https://script.google.com/macros/s/..." style="margin-bottom:16px"/>
    <div style="display:flex;gap:10px">
      <button onclick="closeCfg()" style="flex:1;padding:14px;background:#334155;border:none;border-radius:12px;color:#94a3b8;font-size:14px;font-weight:600;cursor:pointer">Cancelar</button>
      <button onclick="saveUrl()" style="flex:2;padding:14px;background:linear-gradient(135deg,#f59e0b,#d97706);border:none;border-radius:12px;color:#000;font-size:14px;font-weight:700;cursor:pointer">✅ Guardar y Conectar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<script>
const CATS=[
  {id:"gasolina",label:"Gasolina",icon:"⛽",color:"#f59e0b"},
  {id:"mercado",label:"Mercado",icon:"🛒",color:"#10b981"},
  {id:"luz",label:"Luz",icon:"💡",color:"#fbbf24"},
  {id:"agua",label:"Agua",icon:"💧",color:"#38bdf8"},
  {id:"internet",label:"Internet",icon:"📡",color:"#818cf8"},
  {id:"administracion",label:"Administ.",icon:"🏢",color:"#a78bfa"},
  {id:"restaurante",label:"Restaurante",icon:"🍽️",color:"#fb923c"},
  {id:"salud",label:"Salud",icon:"🏥",color:"#34d399"},
  {id:"transporte",label:"Transporte",icon:"🚗",color:"#60a5fa"},
  {id:"entretenimiento",label:"Entretenim.",icon:"🎬",color:"#f472b6"},
  {id:"ropa",label:"Ropa",icon:"👗",color:"#c084fc"},
  {id:"otro",label:"Otro",icon:"📦",color:"#94a3b8"},
];
const MES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const URLK="misgastos_url";
let gastos=[],url="",selCat=null,tab="r";
let fm=new Date().getMonth(),fy=new Date().getFullYear(),tTimer=null;

const $=id=>document.getElementById(id);
const fmt=n=>new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n);
const fmtS=n=>n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n}`;
const hoy=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const ahora=()=>new Date().toLocaleString("es-CO",{dateStyle:"short",timeStyle:"short"});

function toast(msg,t="ok"){
  const e=$("toast");
  e.textContent=msg; e.style.background=t==="err"?"#ef4444":"#10b981"; e.style.display="block";
  clearTimeout(tTimer); tTimer=setTimeout(()=>e.style.display="none",3500);
}

function setConn(on,sync=false){
  $("dot").style.background=on?"#10b981":"#ef4444";
  $("conn-lbl").style.color=on?"#10b981":"#ef4444";
  $("conn-lbl").textContent=!on?"Sin configurar":sync?"Sincronizando…":"Sheets conectado";
  $("btn-sync").style.display=on?"block":"none";
}

async function fetchGastos(u){
  if(!u)return;
  setConn(true,true);
  try{
    const r=await fetch(`${u}?t=${Date.now()}`);
    const d=await r.json();
    if(d.gastos){gastos=[...d.gastos].reverse();render();}
  }catch{toast("Error conectando Sheets","err");}
  setConn(true,false);
}

function openCfg(){$("modal").style.display="flex";$("url-inp").value=url;}
function closeCfg(){$("modal").style.display="none";}
function saveUrl(){
  const u=$("url-inp").value.trim();
  if(!u.startsWith("https://script.google.com"))return toast("URL inválida","err");
  localStorage.setItem(URLK,u); url=u; closeCfg();
  toast("✅ Conectado con Google Sheets"); fetchGastos(u);
}

function parseDate(f){
  try{
    const s=String(f||"").trim();
    if(/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s.substring(0,10)+"T12:00:00");
    return new Date(s);
  }catch{return new Date();}
}
function gf(){
  return gastos.filter(g=>{
    const d=parseDate(g.fecha);
    return d.getMonth()===fm&&d.getFullYear()===fy;
  });
}

function buildSel(){
  const sm=$("sel-m"),sy=$("sel-y");
  sm.innerHTML=MES.map((m,i)=>`<option value="${i}"${i===fm?" selected":""}>${m}</option>`).join("");
  const yrs=[...new Set(gastos.map(g=>parseDate(g.fecha).getFullYear()))];
  if(!yrs.includes(fy))yrs.push(fy); yrs.sort((a,b)=>b-a);
  sy.innerHTML=yrs.map(y=>`<option value="${y}"${y===fy?" selected":""}>${y}</option>`).join("");
  sm.onchange=e=>{fm=+e.target.value;render();};
  sy.onchange=e=>{fy=+e.target.value;render();};
}

function selCatFn(id){selCat=selCat===id?null:id;renderR();}

async function registrar(){
  if(!url)return toast("Configura tu Google Sheet ⚙️","err");
  if(!selCat)return toast("Selecciona una categoría","err");
  const val=parseFloat($("ia").value.replace(/[^0-9.]/g,""));
  if(!val||val<=0)return toast("Ingresa un valor válido","err");
  const cat=CATS.find(c=>c.id===selCat);
  const desc=$("id").value.trim()||cat.label;
  const g={id:Date.now(),fecha:hoy(),fechaHora:ahora(),categoria:selCat,label:cat.label,icon:cat.icon,color:cat.color,monto:val,descripcion:desc};
  const b=$("breg"); b.disabled=true; b.textContent="⏳ Guardando…";
  try{
    const r=await fetch(url,{method:"POST",body:JSON.stringify({accion:"add",gasto:g})});
    const d=await r.json();
    if(d.ok){gastos=[g,...gastos];selCat=null;toast(`${cat.icon} ${fmt(val)} guardado ✅`);render();}
    else toast("Error al guardar","err");
  }catch{toast("Error de conexión","err");}
  const b2=$("breg"); if(b2){b2.disabled=false;b2.textContent="✅ Registrar Gasto";}
}

async function eliminar(id){
  try{
    const r=await fetch(url,{method:"POST",body:JSON.stringify({accion:"delete",id})});
    const d=await r.json();
    if(d.ok){gastos=gastos.filter(g=>g.id!==id);toast("Eliminado","err");render();}
  }catch{toast("Error","err");}
}

function confirmDel(id){
  const b=$("d"+id); if(!b)return;
  b.outerHTML=`<span id="d${id}">
    <button onclick="eliminar(${id})" style="background:#ef4444;border:none;border-radius:6px;padding:4px 8px;color:#fff;font-size:12px;cursor:pointer;font-weight:700">✓</button>
    <button onclick="render()" style="background:#334155;border:none;border-radius:6px;padding:4px 8px;color:#94a3b8;font-size:12px;cursor:pointer;margin-left:3px">✗</button>
  </span>`;
}

function renderResumen(){
  const g=gf(), tot=g.reduce((s,x)=>s+x.monto,0);
  const card=$("res-card");
  if(!url){card.style.display="none";return;}
  card.style.cssText+="display:flex";
  $("res-lbl").textContent=`TOTAL ${MES[fm].toUpperCase()} ${fy}`;
  $("res-tot").textContent=fmt(tot);
  $("res-cnt").textContent=`${g.length} transacciones`;
  const pd=CATS.map(c=>({name:c.label,icon:c.icon,v:g.filter(x=>x.categoria===c.id).reduce((s,x)=>s+x.monto,0)})).filter(d=>d.v>0).sort((a,b)=>b.v-a.v);
  $("res-top").innerHTML=pd[0]?`<div style="font-size:11px;color:rgba(0,0,0,.5);margin-bottom:2px">Mayor gasto</div><div style="font-size:14px;font-weight:700;color:#000">${pd[0].icon} ${pd[0].name}</div><div style="font-size:13px;color:rgba(0,0,0,.7)">${fmtS(pd[0].v)}</div>`:"";
}

function renderR(){
  const el=$("pnl-r");
  el.innerHTML=`
    <div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:14px;letter-spacing:.5px">CATEGORÍA</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px">
      ${CATS.map(c=>`<button class="cat-btn" onclick="selCatFn('${c.id}')"
        style="border-color:${selCat===c.id?c.color:"#334155"};background:${selCat===c.id?c.color+"22":"#1e293b"};transform:${selCat===c.id?"scale(1.05)":"scale(1)"}">
        <span style="font-size:24px">${c.icon}</span>
        <span style="font-size:10px;font-weight:600;text-align:center;line-height:1.2;color:${selCat===c.id?c.color:"#94a3b8"}">${c.label}</span>
      </button>`).join("")}
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500">VALOR ($)</div>
      <div style="position:relative">
        <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#f59e0b;font-weight:700;font-size:18px">$</span>
        <input id="ia" type="number" class="inp" placeholder="0" style="padding-left:34px;font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif"/>
      </div>
    </div>
    <div style="margin-bottom:18px">
      <div style="font-size:12px;color:#64748b;margin-bottom:8px;font-weight:500">DESCRIPCIÓN (opcional)</div>
      <input id="id" type="text" class="inp" placeholder="Ej: Tanqueada viernes, Recibo agosto…"/>
    </div>
    <div style="display:flex;align-items:center;gap:8px;background:#1e293b;border-radius:10px;padding:11px 14px;margin-bottom:18px">
      <span>📅</span>
      <div>
        <div style="font-size:10px;color:#475569">FECHA AUTOMÁTICA</div>
        <div style="font-size:13px;font-weight:600;color:#94a3b8">${ahora()}</div>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:5px">
        <div style="width:6px;height:6px;border-radius:50%;background:#10b981"></div>
        <span style="font-size:10px;color:#10b981">Google Sheets</span>
      </div>
    </div>
    <button id="breg" class="btn-primary" onclick="registrar()">✅ Registrar Gasto</button>
    ${gastos.slice(0,3).length?`
    <div style="margin-top:26px">
      <div style="font-size:12px;color:#475569;font-weight:600;margin-bottom:10px">ÚLTIMOS REGISTROS</div>
      ${gastos.slice(0,3).map(g=>`
        <div style="display:flex;align-items:center;justify-content:space-between;background:#1e293b;border-radius:12px;padding:13px 14px;margin-bottom:8px;border-left:3px solid ${g.color}">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:20px">${g.icon}</span>
            <div>
              <div style="font-weight:600;font-size:13px">${g.descripcion}</div>
              <div style="font-size:11px;color:#475569">${g.fechaHora}</div>
            </div>
          </div>
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:${g.color};font-size:14px">${fmt(g.monto)}</div>
        </div>`).join("")}
    </div>`:""}
  `;
}

function renderG(){
  const el=$("pnl-g"), g=gf(), tot=g.reduce((s,x)=>s+x.monto,0);
  if(!g.length){el.innerHTML=`<div style="text-align:center;padding:60px 20px;color:#475569"><div style="font-size:48px;margin-bottom:10px">📊</div><div style="font-size:16px;font-weight:600">Sin datos este mes</div></div>`;return;}
  const pd=CATS.map(c=>({name:c.label,icon:c.icon,color:c.color,v:g.filter(x=>x.categoria===c.id).reduce((s,x)=>s+x.monto,0)})).filter(d=>d.v>0).sort((a,b)=>b.v-a.v);

  // Barras SVG
  const bH=140,bPad=6, bW=Math.max(300,pd.length*44);
  const maxV=Math.max(...pd.map(d=>d.v));
  const bw=Math.floor((bW-bPad*(pd.length+1))/pd.length);
  const bars=pd.map((d,i)=>{
    const h=Math.round((d.v/maxV)*(bH-18));
    const x=bPad+i*(bw+bPad), y=bH-h-2;
    return `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="4" fill="${d.color}"/>
      <text x="${x+bw/2}" y="${bH+11}" text-anchor="middle" font-size="9" fill="#64748b">${d.name.slice(0,6)}</text>
      <text x="${x+bw/2}" y="${y-4}" text-anchor="middle" font-size="8" fill="${d.color}">${fmtS(d.v)}</text>`;
  }).join("");

  // Donut SVG
  const cx=80,cy=80,ro=65,ri=38; let ang=-Math.PI/2;
  const slices=pd.map(d=>{
    const a=(d.v/tot)*Math.PI*2;
    const x1=cx+ro*Math.cos(ang),y1=cy+ro*Math.sin(ang);
    const x2=cx+ro*Math.cos(ang+a),y2=cy+ro*Math.sin(ang+a);
    const xi1=cx+ri*Math.cos(ang),yi1=cy+ri*Math.sin(ang);
    const xi2=cx+ri*Math.cos(ang+a),yi2=cy+ri*Math.sin(ang+a);
    const lg=a>Math.PI?1:0;
    const p=`M${x1},${y1} A${ro},${ro} 0 ${lg},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${lg},0 ${xi1},${yi1} Z`;
    ang+=a;
    return `<path d="${p}" fill="${d.color}" stroke="#0f172a" stroke-width="2"/>`;
  }).join("");

  // Línea 6 meses
  const ld=Array.from({length:6},(_,i)=>{
    const d=new Date(fy,fm-5+i,1),m=d.getMonth(),y=d.getFullYear();
    return{mes:MES[m],v:gastos.filter(g=>{const gd=parseDate(g.fecha);return gd.getMonth()===m&&gd.getFullYear()===y;}).reduce((s,g)=>s+g.monto,0)};
  });
  const lW=300,lH=110,maxL=Math.max(...ld.map(d=>d.v),1);
  const pts=ld.map((d,i)=>({x:20+i*(lW-40)/5,y:lH-8-Math.round((d.v/maxL)*(lH-18)),d}));
  const poly=pts.map(p=>`${p.x},${p.y}`).join(" ");

  el.innerHTML=`
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">📊 Por Categoría</div>
      <div style="overflow-x:auto"><svg viewBox="0 0 ${bW} ${bH+14}" style="width:100%;min-width:240px">${bars}</svg></div>
    </div>
    <div class="card" style="display:flex;gap:12px;align-items:flex-start">
      <div>
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">🥧 Distribución</div>
        <svg viewBox="0 0 160 160" width="145" height="145">
          ${slices}
          <text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="600">${fmtS(tot)}</text>
        </svg>
      </div>
      <div style="flex:1;max-height:160px;overflow-y:auto;padding-top:28px">
        ${pd.map(d=>`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
          <div style="display:flex;align-items:center;gap:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:${d.color};flex-shrink:0"></div>
            <span style="font-size:11px;color:#94a3b8">${d.icon} ${d.name}</span>
          </div>
          <span style="font-size:11px;font-weight:700;color:${d.color}">${fmtS(d.v)}</span>
        </div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">📈 Tendencia 6 Meses</div>
      <svg viewBox="0 0 ${lW} ${lH+14}" style="width:100%">
        <polyline points="${poly}" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
        ${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#f59e0b"/>`).join("")}
        ${pts.map(p=>`<text x="${p.x}" y="${lH+10}" text-anchor="middle" font-size="9" fill="#64748b">${p.d.mes}</text>`).join("")}
        ${pts.map(p=>p.d.v>0?`<text x="${p.x}" y="${p.y-7}" text-anchor="middle" font-size="8" fill="#f59e0b">${fmtS(p.d.v)}</text>`:``).join("")}
      </svg>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">🏆 Top Categorías</div>
      ${pd.slice(0,5).map(d=>`
        <div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:13px">${d.icon} ${d.name}</span>
            <span style="font-size:13px;font-weight:700;color:${d.color}">${fmtS(d.v)}</span>
          </div>
          <div style="background:#0f172a;border-radius:99px;height:5px;overflow:hidden">
            <div style="height:100%;background:${d.color};border-radius:99px;width:${(d.v/tot*100).toFixed(1)}%"></div>
          </div>
          <div style="font-size:10px;color:#475569;margin-top:2px">${(d.v/tot*100).toFixed(1)}% del total</div>
        </div>`).join("")}
    </div>
  `;
}

function renderH(){
  const el=$("pnl-h"), g=gf(), tot=g.reduce((s,x)=>s+x.monto,0);
  el.innerHTML=`
    <div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:14px">${g.length} REGISTROS — ${MES[fm]} ${fy}</div>
    ${!g.length?`<div style="text-align:center;padding:60px 20px;color:#475569"><div style="font-size:48px;margin-bottom:10px">📋</div><div style="font-size:16px;font-weight:600">Sin registros este mes</div></div>`:`
      ${g.map(x=>`<div class="gasto-row" style="border-left:3px solid ${x.color}">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <span style="font-size:22px">${x.icon}</span>
          <div>
            <div style="font-weight:600;font-size:13px">${x.descripcion}</div>
            <div style="font-size:10px;color:#475569;margin-top:2px">
              <span style="background:${x.color}22;color:${x.color};border-radius:4px;padding:1px 5px;font-weight:600;font-size:9px">${x.label}</span>
              &nbsp;${x.fechaHora}
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;color:${x.color};font-size:14px">${fmt(x.monto)}</div>
          <span id="d${x.id}"><button onclick="confirmDel(${x.id})" style="background:none;border:none;cursor:pointer;color:#475569;font-size:17px;padding:4px">🗑️</button></span>
        </div>
      </div>`).join("")}
      <div style="background:linear-gradient(135deg,#f59e0b22,#d9770622);border:1px solid #f59e0b44;border-radius:14px;padding:15px 18px;margin-top:8px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700;color:#94a3b8;font-size:13px">TOTAL DEL MES</span>
        <span style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#f59e0b">${fmt(tot)}</span>
      </div>
    `}
  `;
}

function renderSetup(){
  $("pnl-setup").innerHTML=`
    <div style="text-align:center;margin-bottom:28px;padding-top:10px">
      <div style="font-size:60px;margin-bottom:12px">📊</div>
      <div style="font-family:'Space Grotesk',sans-serif;font-size:21px;font-weight:700;margin-bottom:8px">Conecta tu Google Sheet</div>
      <div style="color:#64748b;font-size:14px;line-height:1.7">Guarda tus gastos en la nube<br>accesibles desde cualquier dispositivo</div>
    </div>
    <button class="btn-primary" onclick="openCfg()" style="margin-bottom:28px">⚙️ Configurar Google Sheet</button>
    <div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:14px;letter-spacing:.5px">PASOS RÁPIDOS</div>
    ${[["1","Abre tu Google Sheet → Extensiones → Apps Script"],["2","Pega el código del archivo Code.gs y guarda"],["3","Implementar → Nueva implementación → Aplicación web"],["4","Acceso: Cualquier persona → Copia la URL"],["5","Pega la URL aquí ✅"]].map(([n,t])=>`
    <div style="display:flex;gap:14px;align-items:flex-start;background:#1e293b;border-radius:12px;padding:14px 16px;margin-bottom:8px">
      <div style="width:26px;height:26px;border-radius:50%;background:#f59e0b22;border:1.5px solid #f59e0b;color:#f59e0b;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${n}</div>
      <div style="font-size:13px;color:#94a3b8;line-height:1.6">${t}</div>
    </div>`).join("")}
  `;
}

function setTab(t){
  tab=t;
  ["r","g","h"].forEach(id=>{
    $("t-"+id).classList.toggle("active",id===t);
    $("pnl-"+id).style.display=id===t&&url?"block":"none";
  });
  if(url){
    if(t==="r")renderR();
    if(t==="g")renderG();
    if(t==="h")renderH();
  }
}

function render(){
  buildSel();
  renderResumen();
  const hasUrl=!!url;
  $("pnl-setup").style.display=hasUrl?"none":"block";
  ["r","g","h"].forEach(id=>$("pnl-"+id).style.display=id===tab&&hasUrl?"block":"none");
  if(hasUrl){
    if(tab==="r")renderR();
    if(tab==="g")renderG();
    if(tab==="h")renderH();
  } else renderSetup();
}

// Init
(async()=>{
  const FIXED_URL="https://script.google.com/macros/s/AKfycbxEkO_kQM6i3zb1C93oZ8aKT6lpBzxR7j4d_9HdNRV1_IFF1h1D2lJC1WZEEPlXHb53mg/exec";
  const u=localStorage.getItem(URLK)||FIXED_URL;
  localStorage.setItem(URLK,u);
  url=u; setConn(true,true); $("btn-sync").onclick=()=>fetchGastos(url); await fetchGastos(u);
  render();
})();

if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script>
